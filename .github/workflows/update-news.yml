name: Update semiconductor news

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-semiconductor-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync with latest main
        run: git pull --rebase origin main

      - name: Fetch latest news
        run: npm run fetch-news

      - name: Commit and push updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/news.json
          if git diff --cached --quiet; then
            echo "No news changes to commit"
            exit 0
          fi
          git commit -m "chore: update semiconductor news"
          git pull --rebase --autostash origin main
          git push origin main
