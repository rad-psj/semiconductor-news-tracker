name: Update semiconductor news

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest news
        run: npm run fetch-news

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update semiconductor news"
          file_pattern: src/news.json